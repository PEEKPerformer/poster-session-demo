<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#002855"/>
  <!-- Simplified polymer chain nodes -->
  <circle cx="8" cy="16" r="3" fill="#FFAE00"/>
  <circle cx="16" cy="9" r="3" fill="#FFAE00"/>
  <circle cx="24" cy="16" r="3" fill="#FFAE00"/>
  <circle cx="16" cy="23" r="3" fill="#FFAE00"/>
  <!-- Bonds -->
  <line x1="8" y1="16" x2="16" y2="9" stroke="#FFAE00" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="9" x2="24" y2="16" stroke="#FFAE00" stroke-width="1.5" opacity="0.7"/>
  <line x1="24" y1="16" x2="16" y2="23" stroke="#FFAE00" stroke-width="1.5" opacity="0.7"/>
  <line x1="16" y1="23" x2="8" y2="16" stroke="#FFAE00" stroke-width="1.5" opacity="0.7"/>
  <!-- Cross-link -->
  <line x1="8" y1="16" x2="24" y2="16" stroke="#FFAE00" stroke-width="1" opacity="0.4"/>
  <line x1="16" y1="9" x2="16" y2="23" stroke="#FFAE00" stroke-width="1" opacity="0.4"/>
</svg>
